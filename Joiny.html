<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Join Now - Registration Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e2f0e2 0%, #d0e4d0 100%);
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
            padding: 2rem 1.5rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-container {
            max-width: 860px;
            width: 100%;
            margin: 0 auto;
            background: #f0f9f0;
            border-radius: 48px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.1), 0 2px 8px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .form-header {
            background: #e2f0e2;
            padding: 1.8rem 2rem 1.5rem;
            text-align: center;
            color: #2c4a3a;
            border-bottom: 2px solid #c8dec8;
        }

        .form-header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 0.5rem;
            color: #1e4a3a;
        }

        .form-header p {
            font-size: 1rem;
            opacity: 0.75;
            font-weight: 500;
            margin-top: 8px;
            color: #3a5e4a;
        }

        .whatsapp-badge {
            background: #d4e8d4;
            display: inline-block;
            padding: 5px 16px;
            border-radius: 60px;
            margin-top: 14px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #2b5e3b;
        }

        .form-body {
            padding: 2rem 2rem 2.2rem;
        }

        .input-group {
            margin-bottom: 1.4rem;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #2c4a3a;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .required-star {
            color: #e05a5a;
            font-size: 1rem;
            margin-left: 4px;
        }

        input, select, textarea {
            font-family: inherit;
            font-size: 1rem;
            padding: 0.85rem 1rem;
            border: 1.5px solid #c8dec8;
            border-radius: 24px;
            background: #ffffff;
            transition: all 0.2s;
            outline: none;
            color: #1e3a2a;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #7eb07e;
            box-shadow: 0 0 0 3px rgba(100, 150, 100, 0.2);
            background: #fff;
        }

        .row-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        textarea {
            resize: vertical;
            min-height: 85px;
        }

        .checkbox-group {
            flex-direction: row;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }

        .checkbox-group label {
            font-weight: 500;
            margin-bottom: 0;
            cursor: pointer;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            accent-color: #5f9e5f;
        }

        /* Smaller submit button as requested */
        .submit-btn {
            background: #2c6e4a;
            color: white;
            border: none;
            padding: 0.7rem 1.2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 40px;
            width: auto;
            min-width: 220px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);
            margin-top: 0.5rem;
            letter-spacing: 0.3px;
        }

        .submit-btn:hover {
            background: #215a3e;
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }

        .submit-btn:active {
            transform: translateY(1px);
        }

        .button-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 0.8rem;
        }

        .note-text {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 1.2rem;
            color: #5a7a5a;
            background: #eaf4ea;
            padding: 8px 14px;
            border-radius: 60px;
        }

        .toast-msg {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c5a3a;
            color: white;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 500;
            z-index: 1000;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(4px);
            background: #2a6a46e6;
            font-size: 0.85rem;
            pointer-events: none;
            transition: opacity 0.2s;
            opacity: 0;
        }

        .toast-msg.show {
            opacity: 1;
        }

        @media (max-width: 620px) {
            body {
                padding: 1rem;
            }
            .form-body {
                padding: 1.5rem;
            }
            .row-2col {
                grid-template-columns: 1fr;
                gap: 0;
            }
            .form-header h1 {
                font-size: 1.8rem;
            }
            .submit-btn {
                width: 100%;
                justify-content: center;
            }
        }

        select {
            cursor: pointer;
            background-color: #fff;
        }

        input::placeholder, textarea::placeholder {
            color: #aac2aa;
            font-weight: 400;
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="form-header">
        <h1>JOIN NOW</h1>
        <p>Become a part of our community. Fill the details below.</p>
        <div class="whatsapp-badge">
            After submit → Message on +91 97951 99119
        </div>
    </div>

    <div class="form-body">
        <form id="joinForm">
            <div class="input-group">
                <label>Full Name <span class="required-star">*</span></label>
                <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
            </div>

            <div class="row-2col">
                <div class="input-group">
                    <label>Email Address <span class="required-star">*</span></label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label>Mobile Number <span class="required-star">*</span></label>
                    <input type="tel" id="mobile" name="mobile" placeholder="10-digit mobile number" pattern="[0-9]{10}" maxlength="10" required>
                </div>
            </div>

            <div class="row-2col">
                <div class="input-group">
                    <label>Date of Birth</label>
                    <input type="date" id="dob" name="dob">
                </div>
                <div class="input-group">
                    <label>Gender</label>
                    <select id="gender" name="gender">
                        <option value="Prefer not to say">Prefer not to say</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label>Address</label>
                <input type="text" id="address" name="address" placeholder="Street, city, pincode">
            </div>

            <div class="row-2col">
                <div class="input-group">
                    <label>City</label>
                    <input type="text" id="city" name="city" placeholder="Your city">
                </div>
                <div class="input-group">
                    <label>State</label>
                    <input type="text" id="state" name="state" placeholder="State / Province">
                </div>
            </div>

            <div class="input-group">
                <label>Interested In <span class="required-star">*</span></label>
                <select id="course" required>
                    <option value="" disabled selected>-- Select a program --</option>
                    <option value="Web Development Bootcamp">Web Development Bootcamp</option>
                    <option value="Digital Marketing Mastery">Digital Marketing Mastery</option>
                    <option value="Data Science & AI">Data Science & AI</option>
                    <option value="Graphic Design Pro">Graphic Design Pro</option>
                    <option value="Business Leadership">Business Leadership</option>
                    <option value="Other / Custom">Other / Custom</option>
                </select>
            </div>

            <div class="input-group">
                <label>Why do you want to join? (optional)</label>
                <textarea id="message" placeholder="Tell us your motivation, goals, or any question..."></textarea>
            </div>

            <div class="input-group checkbox-group">
                <input type="checkbox" id="agreeTerms" required>
                <label for="agreeTerms">I confirm that the information provided is accurate & I agree to receive updates via WhatsApp. <span class="required-star">*</span></label>
            </div>

            <div class="button-wrapper">
                <button type="submit" class="submit-btn">
                    SUBMIT & SEND WHATSAPP
                </button>
            </div>
            <div class="note-text">
                Your details will be shared securely. After clicking, you will be redirected to WhatsApp with a pre-filled message to +91 97951 99119
            </div>
        </form>
    </div>
</div>

<div id="toastMsg" class="toast-msg">Message prepared! Redirecting...</div>

<script>
    (function() {
        const form = document.getElementById('joinForm');
        const toast = document.getElementById('toastMsg');

        function showToast(message, isError = false) {
            toast.textContent = message || (isError ? 'Something went wrong' : 'Almost done!');
            toast.style.backgroundColor = isError ? '#b95a5ae6' : '#2a6a46e6';
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2800);
        }

        function formatWhatsAppMessage(formData) {
            const name = formData.fullName || 'Not provided';
            const email = formData.email || '—';
            const mobile = formData.mobile || '—';
            const dob = formData.dob || '—';
            const gender = formData.gender || 'Prefer not to say';
            const address = formData.address || '—';
            const city = formData.city || '—';
            const state = formData.state || '—';
            const course = formData.course || '—';
            const extraMsg = formData.message ? formData.message.trim() : '—';

            let waMessage = `*NEW JOIN REQUEST*%0A%0A` +
                `*Name:* ${name}%0A` +
                `*Email:* ${email}%0A` +
                `*Mobile:* ${mobile}%0A` +
                `*DOB:* ${dob}%0A` +
                `*Gender:* ${gender}%0A` +
                `*Address:* ${address}%0A` +
                `*City:* ${city}%0A` +
                `*State:* ${state}%0A` +
                `*Course:* ${course}%0A` +
                `*Message/Reason:* ${extraMsg}%0A%0A` +
                `Submitted via Join Now form`;

            return waMessage;
        }

        function isValidMobile(mob) {
            const mobileRegex = /^[0-9]{10}$/;
            return mobileRegex.test(mob);
        }

        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
            return emailRegex.test(email);
        }

        function collectFormData() {
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const mobile = document.getElementById('mobile').value.trim();
            const dob = document.getElementById('dob').value;
            const gender = document.getElementById('gender').value;
            const address = document.getElementById('address').value.trim();
            const city = document.getElementById('city').value.trim();
            const state = document.getElementById('state').value.trim();
            const course = document.getElementById('course').value;
            const message = document.getElementById('message').value.trim();
            const agree = document.getElementById('agreeTerms').checked;

            if (!fullName) {
                showToast('Please enter your full name', true);
                return { error: true };
            }
            if (!email) {
                showToast('Email address is required', true);
                return { error: true };
            }
            if (!isValidEmail(email)) {
                showToast('Enter a valid email (e.g., name@example.com)', true);
                return { error: true };
            }
            if (!mobile) {
                showToast('Mobile number is required', true);
                return { error: true };
            }
            if (!isValidMobile(mobile)) {
                showToast('Mobile number must be exactly 10 digits (0-9)', true);
                return { error: true };
            }
            if (!course || course === "") {
                showToast('Please select your interested program', true);
                return { error: true };
            }
            if (!agree) {
                showToast('You must agree to the terms to submit', true);
                return { error: true };
            }

            return {
                error: false,
                data: {
                    fullName: fullName,
                    email: email,
                    mobile: mobile,
                    dob: dob || 'Not provided',
                    gender: gender,
                    address: address || 'Not provided',
                    city: city || 'Not provided',
                    state: state || 'Not provided',
                    course: course,
                    message: message || 'No additional message',
                }
            };
        }

        function handleSubmit(event) {
            event.preventDefault();

            const collected = collectFormData();
            if (collected.error) return;

            const formData = collected.data;
            let waMessage = formatWhatsAppMessage(formData);
            
            const phoneNumber = "919795199119";
            const waUrl = `https://wa.me/${phoneNumber}?text=${waMessage}`;

            showToast(`Redirecting to WhatsApp...`, false);
            
            setTimeout(() => {
                window.open(waUrl, '_blank');
                setTimeout(() => {
                    showToast(`Message template sent to +91 97951 99119`, false);
                }, 1000);
            }, 400);
        }

        form.addEventListener('submit', handleSubmit);
        
        const mobileInput = document.getElementById('mobile');
        mobileInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0,10);
        });

        const nameInput = document.getElementById('fullName');
        nameInput.addEventListener('input', function() {
            this.value = this.value.replace(/[^\w\s\u0600-\u06FF\u00C0-\u024F]/g, '');
        });
    })();
</script>
</body>
</html>
